<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAVE STRIKE - 3D 弓シューティング</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div id="app">

    <div id="title-screen" class="screen">
      <canvas id="titleCanvas3d"></canvas>
      <div class="title-vignette"></div>
      <div class="title-container">
        <h1 class="game-title">CAVE<br>STRIKE</h1>
        <p class="subtitle">ファーストパーソン 弓シューティング</p>
        <div class="difficulty-select">
          <button data-difficulty="easy" class="diff-btn easy">
            <span class="diff-name">EASY</span>
            <span class="diff-desc">5 Waves / HP 5 / 敵がゆっくり</span>
          </button>
          <button data-difficulty="normal" class="diff-btn normal">
            <span class="diff-name">NORMAL</span>
            <span class="diff-desc">5 Waves / HP 5 / 速い敵</span>
          </button>
          <button data-difficulty="hard" class="diff-btn hard">
            <span class="diff-name">HARD</span>
            <span class="diff-desc">5 Waves / HP 5 / 大群・高速</span>
          </button>
        </div>
        <button id="btn-ranking" class="menu-btn">ランキング</button>
        <div class="how-to-play">
          <h3>遊び方</h3>
          <ul>
            <li>洞窟の奥から敵が迫ってきます</li>
            <li>マウスで狙いを定め、クリック / スペースで射撃</li>
            <li>雑魚は1発、ボスは連射で撃破</li>
            <li>HPが0になるとゲームオーバー</li>
            <li>Wave 5 では巨大ボスが出現します</li>
          </ul>
        </div>
      </div>
    </div>

    <div id="game-screen" class="screen">
      <div id="game-canvas-wrap">
        <canvas id="gameCanvas3d"></canvas>
        <canvas id="gameCanvas2d"></canvas>
      </div>
    </div>

    <div id="result-screen" class="screen">
      <div id="result-content"></div>
    </div>

    <div id="ranking-screen" class="screen">
      <div class="ranking-container">
        <h2 class="ranking-title">RANKING</h2>
        <div id="ranking-tabs"></div>
        <div id="ranking-body"></div>
        <button id="btn-back-title" class="menu-btn">タイトルへ戻る</button>
      </div>
    </div>

  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    window.THREE = THREE;
    window.EffectComposer = EffectComposer;
    window.RenderPass = RenderPass;
    window.UnrealBloomPass = UnrealBloomPass;
    window.ShaderPass = ShaderPass;
    window.dispatchEvent(new CustomEvent('threeReady'));
  </script>
  <script src="/static/js/enemies.js"></script>
  <script src="/static/js/effects.js"></script>
  <script src="/static/js/audio.js"></script>
  <script src="/static/js/game.js"></script>
  <script src="/static/js/title.js"></script>
  <script src="/static/js/ranking.js"></script>
  <script src="/static/js/main.js"></script>
</body>
</html>
